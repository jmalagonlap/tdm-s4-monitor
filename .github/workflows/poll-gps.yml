name: Poll GPS Data

on:
  schedule:
    # Ejecutar cada 5 minutos (GitHub Actions mínimo: 5 min)
    - cron: '*/5 * * * *'
    # Resumen diario a las 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Permitir ejecución manual

jobs:
  poll-gps:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install --save-dev

      - name: Determine which script to run
        id: script
        run: |
          # Si es a las 00:00 UTC, ejecutar resumen diario
          # En otros horarios, ejecutar polling
          HOUR=$(date -u +%H)
          if [ "$HOUR" = "00" ]; then
            echo "script=daily-summary" >> $GITHUB_OUTPUT
          else
            echo "script=poll-gps" >> $GITHUB_OUTPUT
          fi

      - name: Poll GPS data from ÁRTIMO API
        if: steps.script.outputs.script == 'poll-gps'
        env:
          ARTIMO_USERNAME: ${{ secrets.ARTIMO_USERNAME }}
          ARTIMO_PASSWORD: ${{ secrets.ARTIMO_PASSWORD }}
        run: node scripts/poll-gps.js

      - name: Generate daily summary
        if: steps.script.outputs.script == 'daily-summary'
        run: node scripts/daily-summary.js

      - name: Commit and push data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # Agregar archivo (incluso si es nuevo)
          git add data/gps-data.json data/daily-summary.json data/daily-history/ || true

          # Commit solo si hay cambios
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update GPS data from ÁRTIMO API [skip ci]"
            git push
          fi
        continue-on-error: true
